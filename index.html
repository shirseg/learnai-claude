<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn AI – Chapter 1 EP · 3. Polling</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.scss">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo-group">
      <button class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <img class="logo" src="assets/logo.svg" alt="Learn AI" />
    </div>

    <div class="page-title">
      <span>Chapter 1, Elevator Pitch</span>
      <span>- 3. Polling</span>
    </div>

    <div class="header-controls">
      <div class="session-code">
        <span class="session-code-label">Session code:</span>
        <span class="session-code-value">1234</span>
      </div>

      <div class="viewers">
        <svg aria-hidden="true"><use href="assets/icons.svg#icon-user"/></svg>
        <span class="viewers-text">12 out of 23</span>
      </div>

      <div class="qr-wrap">
        <button class="icon-btn" aria-label="QR code">
          <svg aria-hidden="true"><use href="assets/icons.svg#icon-qr-code"/></svg>
        </button>
      </div>

      <button class="icon-btn" aria-label="Collapse">
        <svg aria-hidden="true"><use href="assets/icons.svg#icon-minimize"/></svg>
      </button>

      <button class="close-btn" aria-label="Close">
        <svg aria-hidden="true"><use href="assets/icons.svg#icon-close"/></svg>
      </button>
    </div>
  </header>

  <!-- MAIN CONTENT (centred between header and footer) -->
  <div class="content">
    <h1 class="main-title">Class poll in progress - submit your responses on your device.</h1>

    <div class="connected">
      <svg aria-hidden="true"><use href="assets/icons.svg#icon-user"/></svg>
      <p class="connected-text"><strong>23</strong>&nbsp;<em>connected</em></p>
    </div>

    <div class="questions">
      <!-- Question 1 -->
      <div class="question">
        <div class="question-label">
          <span>Question 1</span>
          <svg aria-label="Info"><use href="assets/icons.svg#icon-info"/></svg>
        </div>
        <div class="donut-wrapper">
          <canvas id="chart-q1"></canvas>
          <div class="donut-center">
            <div class="donut-number">14</div>
            <div class="donut-label">Answers</div>
          </div>
        </div>
      </div>

      <!-- Question 2 -->
      <div class="question">
        <div class="question-label">
          <span>Question 2</span>
          <svg aria-label="Info"><use href="assets/icons.svg#icon-info"/></svg>
        </div>
        <div class="donut-wrapper">
          <canvas id="chart-q2"></canvas>
          <div class="donut-center">
            <div class="donut-number">9</div>
            <div class="donut-label">Answers</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- DIVIDER -->
  <div class="divider"></div>

  <!-- BOTTOM LEFT -->
  <div class="bottom-left">
    <button class="pill-btn">Show Results</button>
    <button class="pill-btn">
      <svg aria-hidden="true"><use href="assets/icons.svg#icon-turn-off"/></svg>
      Turn Off Responses
    </button>
  </div>

  <!-- BOTTOM RIGHT -->
  <div class="bottom-right">
    <button class="pill-btn pill-btn-nav">
      <svg aria-hidden="true"><use href="assets/icons.svg#icon-arrow-left"/></svg>
      Pre. Step
    </button>
    <button class="pill-btn pill-btn-nav">
      Next Step
      <svg aria-hidden="true"><use href="assets/icons.svg#icon-arrow-right"/></svg>
    </button>
  </div>


  <script>
    const chartOptions = {
      cutout: '76%',
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      animation: { duration: 600 },
      borderWidth: 0,
    };

    new Chart(document.getElementById('chart-q1'), {
      type: 'doughnut',
      data: {
        datasets: [{ data: [14, 9], backgroundColor: ['#7B59CA', 'rgba(163,148,214,0.18)'] }]
      },
      options: chartOptions,
    });

    new Chart(document.getElementById('chart-q2'), {
      type: 'doughnut',
      data: {
        datasets: [{ data: [9, 14], backgroundColor: ['#7B59CA', 'rgba(163,148,214,0.18)'] }]
      },
      options: chartOptions,
    });
  </script>
</body>
</html>
