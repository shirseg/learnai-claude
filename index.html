<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn AI – Chapter 1 EP · 3. Polling</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.scss">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo-group">
      <button class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <img class="logo" src="assets/logo.svg" alt="Learn AI" />
    </div>

    <div class="page-title">
      <span>Chapter 1, Elevator Pitch</span>
      <span>- 3. Polling</span>
    </div>

    <div class="header-controls">
      <div class="session-code">
        <span class="session-code-label">Session code:</span>
        <span class="session-code-value">1234</span>
      </div>

      <div class="viewers">
        <img src="assets/icon-person.svg" alt="" />
        <span class="viewers-text">12 out of 23</span>
      </div>

      <div class="qr-wrap">
        <div class="icon-btn">
          <img src="assets/icon-qr.svg" alt="QR code" />
        </div>
      </div>

      <div class="icon-btn">
       <img src="assets/icon-collapse.svg" alt="Collapse" />
      </div>

      <button class="close-btn" aria-label="Close">
        <img src="assets/icon-close.svg" alt="" />
      </button>
    </div>
  </header>

  <!-- MAIN CONTENT (centred between header and footer) -->
  <div class="content">
    <h1 class="main-title">Class poll in progress - submit your responses on your device.</h1>

    <div class="connected">
      <img src="assets/icon-connected.svg" alt="" />
      <p class="connected-text"><strong>23</strong>&nbsp;<em>connected</em></p>
    </div>

    <div class="questions">
      <!-- Question 1 -->
      <div class="question">
        <div class="question-label">
          <span>Question 1</span>
          <img src="assets/icon-info.svg" alt="Info" />
        </div>
        <div class="donut-wrapper">
          <img class="layer" src="assets/donut-bg.svg" alt="" />
          <img class="layer" src="assets/donut-q1.svg" alt="" />
          <div class="donut-center">
            <div class="donut-number">14</div>
            <div class="donut-label">Answers</div>
          </div>
        </div>
      </div>

      <!-- Question 2 -->
      <div class="question">
        <div class="question-label">
          <span>Question 2</span>
          <img src="assets/icon-info.svg" alt="Info" />
        </div>
        <div class="donut-wrapper">
          <img class="layer" src="assets/donut-bg.svg" alt="" />
          <img class="layer" src="assets/donut-q2.svg" alt="" />
          <div class="donut-center">
            <div class="donut-number">9</div>
            <div class="donut-label">Answers</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- DIVIDER -->
  <div class="divider"></div>

  <!-- BOTTOM LEFT -->
  <div class="bottom-left">
    <button class="pill-btn">Show Results</button>
    <button class="pill-btn">
      <img src="assets/icon-stop.svg" alt="" />
      Turn Off Responses
    </button>
  </div>

  <!-- BOTTOM RIGHT -->
  <div class="bottom-right">
    <button class="pill-btn pill-btn-nav">
      <img src="assets/icon-prev.svg" alt="" />
      Pre. Step
    </button>
    <button class="pill-btn pill-btn-nav">
      Next Step
      <img src="assets/icon-next.svg" alt="" />
    </button>
  </div>

</body>
</html>
